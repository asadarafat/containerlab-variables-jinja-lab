name: Validate Topology Templates

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  render-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install render dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "jinja2-cli[yaml]" pyyaml

      - name: Render exercise templates
        run: |
          jinja2 exercises/04-jinja-template/template.clab.yaml.j2 \
            exercises/04-jinja-template/values.yaml \
            > /tmp/topo04.rendered.clab.yaml

          jinja2 exercises/05-jinja-full-mesh/solution/topo-mesh.clab.yaml.j2 \
            exercises/05-jinja-full-mesh/values.yaml \
            > /tmp/topo-mesh.rendered.clab.yaml

      - name: Validate rendered topology shape
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          def load(path: str):
              with Path(path).open() as f:
                  return yaml.safe_load(f)

          topo04 = load("/tmp/topo04.rendered.clab.yaml")
          nodes04 = topo04["topology"]["nodes"]
          links04 = topo04["topology"]["links"]
          assert len(nodes04) == 4, f"exercise4 nodes mismatch: {len(nodes04)}"
          assert len(links04) == 4, f"exercise4 links mismatch: {len(links04)}"

          mesh = load("/tmp/topo-mesh.rendered.clab.yaml")
          nodes_mesh = mesh["topology"]["nodes"]
          links_mesh = mesh["topology"]["links"]
          n = len(nodes_mesh)
          expected_links = n * (n - 1) // 2
          assert len(links_mesh) == expected_links, (
              f"exercise5 links mismatch: {len(links_mesh)} != {expected_links}"
          )

          seen_pairs = set()
          for link in links_mesh:
              ep1, ep2 = link["endpoints"]
              n1 = ep1.split(":")[0]
              n2 = ep2.split(":")[0]
              pair = tuple(sorted((n1, n2)))
              assert n1 != n2, f"self-link found: {ep1} <-> {ep2}"
              assert pair not in seen_pairs, f"duplicate pair found: {pair}"
              seen_pairs.add(pair)

          print("template render checks passed")
          PY
