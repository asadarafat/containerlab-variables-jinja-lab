# Rendered example from topo09.clab.gotmpl + topo09.clab_vars.yaml

name: topo09

mgmt:
  network: stuttgart
  ipv4-subnet: 99.1.9.0/24

topology:
  nodes:
    r1:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 99.1.9.11
    r2:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 99.1.9.12
    r3:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 99.1.9.13
    r4:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 99.1.9.14

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth1", "r3:eth1"]
    - endpoints: ["r3:eth1", "r4:eth1"]
    - endpoints: ["r4:eth1", "r1:eth1"]
