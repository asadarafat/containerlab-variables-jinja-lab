# Exercise 6 reference solution

# Deploy:
#   SUBNET_ID=7 clab deploy -t topo06.clab.yaml

name: topo${SUBNET_ID}

mgmt:
  network: nsp_ip_oob # docker network name for the OOB segment
  bridge: br_nsp_ip_oob # existing host bridge
  ipv4-subnet: 10.2.${SUBNET_ID}.0/24 # existing OOB subnet
  ipv4-gw: 10.2.${SUBNET_ID}.2 # host bridge IP

topology:
  nodes:
    r1:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 10.2.${SUBNET_ID}.11

    r2:
      kind: linux
      image: alpine:latest # use harbor.nice.nokia.net/docker/alpine:latest if needed
      mgmt-ipv4: 10.2.${SUBNET_ID}.12

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
