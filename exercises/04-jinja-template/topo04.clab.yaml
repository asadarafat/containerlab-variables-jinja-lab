# Rendered example from template.clab.yaml.j2 + values.yaml

name: topo4

mgmt:
  network: stuttgart
  ipv4-subnet: 99.1.5.0/24

topology:
  nodes:
    r1:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 99.1.5.11
    r2:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 99.1.5.12
    r3:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 99.1.5.13
    r4:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 99.1.5.14

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth1", "r3:eth1"]
    - endpoints: ["r3:eth1", "r4:eth1"]
    # closing the loop
    - endpoints: ["r4:eth1", "r1:eth1"]
